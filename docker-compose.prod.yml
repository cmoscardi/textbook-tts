version: '3.8'

services:
  ml-api:
    build:
      context: ./ml-service
      dockerfile: Dockerfile.prod
    container_name: ml-api-prod
    # No GPU needed for API
    volumes:
      - ./hf-cache:/root/.cache/huggingface
      - ./dl-cache:/root/.cache/datalab
    working_dir: /app
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env.production
    environment:
      - NVIDIA_VISIBLE_DEVICES=none
      - TTS_ENGINE=${TTS_ENGINE:-kitten}
    command: ./run-api.prod.sh
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy

  parser:
    build:
      context: ./ml-service
      dockerfile: Dockerfile.prod
    container_name: parser-prod
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0  # GPU 0 on main host
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - WORKER_TYPE=parser
    volumes:
      - ./hf-cache:/root/.cache/huggingface
      - ./dl-cache:/root/.cache/datalab
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env.production
    command: ./run-parser.prod.sh
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "python", "-c", "import torch; exit(0 if torch.cuda.is_available() else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    depends_on:
      rabbitmq:
        condition: service_healthy

  datalab-parser:
    build:
      context: ./ml-service
      dockerfile: Dockerfile.datalab
    container_name: datalab-parser-prod
    restart: unless-stopped
    environment:
      - WORKER_TYPE=datalab-parser
    working_dir: /app
    env_file:
      - .env.production
    command: ./run-datalab-parser.prod.sh
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "python", "-c", "import celery"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy

  fast-parser:
    build:
      context: ./ml-service
      dockerfile: Dockerfile.fast-parser
    container_name: fast-parser-prod
    restart: unless-stopped
    environment:
      - WORKER_TYPE=fast-parser
    working_dir: /app
    env_file:
      - .env.production
    command: ./run-fast-parser.prod.sh
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "python", "-c", "import celery"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-prod
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - ml_network
    depends_on:
      ml-api:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:15672:15672" # Management UI local only
      # - "${MAIN_HOST_TUN0}:5672:5672"   # Bind AMQP to tun0 only (accessible from remote host)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./monitoring/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-prod
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - ml_network

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana-prod
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    networks:
      - ml_network

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter-prod
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - ml_network

  gpu_exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.1.0
    container_name: gpu_exporter-prod
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    # driver 570 removed --help-query-gpus, breaking AUTO field detection.
    # explicit list of fields verified to work on RTX 3070 Ti / driver 570.
    command:
      - "--query-field-names=timestamp,driver_version,count,name,uuid,pci.bus_id,pcie.link.gen.current,pcie.link.gen.max,pcie.link.width.current,pcie.link.width.max,index,display_mode,display_active,persistence_mode,fan.speed,pstate,memory.total,memory.used,memory.free,compute_mode,utilization.gpu,utilization.memory,utilization.encoder,utilization.decoder,encoder.stats.sessionCount,encoder.stats.averageFps,encoder.stats.averageLatency,temperature.gpu,power.draw,power.limit,power.default_limit,power.min_limit,power.max_limit,clocks.current.graphics,clocks.current.sm,clocks.current.memory,clocks.current.video,clocks.max.graphics,clocks.max.sm,clocks.max.memory"
    networks:
      - ml_network

  flower:
    image: mher/flower:2.0
    container_name: flower-prod
    restart: unless-stopped
    command: celery --broker=amqp://guest@rabbitmq// flower --port=5555
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - rabbitmq
    networks:
      - ml_network

networks:
  ml_network:
    external: true
    name: ml_network

volumes:
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
