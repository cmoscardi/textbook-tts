global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ml_api
    static_configs:
      - targets: ['ml-api:8001']

  - job_name: ml_parser
    static_configs:
      - targets: ['parser:9091']

  - job_name: ml_converter
    static_configs:
      - targets: ['converter:9092']

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: node
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: gpu
    static_configs:
      - targets: ['gpu_exporter:9835']
