services:
  app:
    build:
      context: ./ocr-tts
      dockerfile: Dockerfile
    working_dir: /app
    networks:
      - supabase_network_textbook-tts
    volumes:
      - ./ocr-tts:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev
    env_file:
      - .env.development

  ml-api:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: ml-api
    runtime: runc  # No GPU for API
    volumes:
      - ./ml-service:/app
      - ./hf-cache:/root/.cache/huggingface
      - ./dl-cache:/root/.cache/datalab
    working_dir: /app
    command: ./run-api.sh
    ports:
      - "8001:8001"
    env_file:
      - .env.development
    environment:
      - NVIDIA_VISIBLE_DEVICES=none
      - TTS_ENGINE=${TTS_ENGINE:-kitten}
    networks:
      - supabase_network_textbook-tts
    depends_on:
      - rabbitmq

  parser:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: parser
    runtime: ${DOCKER_RUNTIME:-runc}
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-none}  # Set by start.sh
      - WORKER_TYPE=parser
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./ml-service:/app
      - ./hf-cache:/root/.cache/huggingface
      - ./dl-cache:/root/.cache/datalab
    working_dir: /app
    command: ./run-parser.sh
    env_file:
      - .env.development
    networks:
      - supabase_network_textbook-tts
    depends_on:
      - rabbitmq

  converter:
    build:
      context: ./ml-service
      dockerfile: ${TTS_DOCKERFILE:-Dockerfile.kitten}
    container_name: converter
    environment:
      - WORKER_TYPE=converter
      - TTS_ENGINE=${TTS_ENGINE:-kitten}
    volumes:
      - ./ml-service:/app
      - ./hf-cache:/root/.cache/huggingface
      - ./dl-cache:/root/.cache/datalab
    working_dir: /app
    command: ./run-converter.sh
    env_file:
      - .env.development
    networks:
      - supabase_network_textbook-tts
    depends_on:
      - rabbitmq

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    ports:
      - 5672:5672
    env_file:
      - .env.development
    volumes:
      - ./monitoring/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    networks:
      - supabase_network_textbook-tts

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9091:9090"
    networks:
      - supabase_network_textbook-tts

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      - prometheus
    networks:
      - supabase_network_textbook-tts

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - supabase_network_textbook-tts

  flower:
    image: mher/flower:2.0
    container_name: flower
    command: celery --broker=amqp://guest@rabbitmq// flower --port=5555
    ports:
      - "5556:5555"
    depends_on:
      - rabbitmq
    networks:
      - supabase_network_textbook-tts

  localstack:
    image: gresau/localstack-persist:4
    container_name: localstack
    ports:
      - 4566:4566
    environment:
      - SERVICES=s3
      - GATEWAY_LISTEN=0.0.0.0:4566
      - LOCALSTACK_HOST=localstack
    volumes:
      - './localstack:/persisted-data'
    networks:
      - supabase_network_textbook-tts


networks:
  supabase_network_textbook-tts:
    external: true
    name: supabase_network_textbook-tts

volumes:
  prometheus_data:
  grafana_data:
